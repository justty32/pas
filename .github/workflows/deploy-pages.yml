name: Deploy PAS to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只允許一個部署，取消進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate Markdown index
        run: |
          find . -type d \( -name .git -o -name .github \) -prune -o -type f -name '*.md' -print \
            | sed 's|^\./||' | sort | jq -R . | jq -s -c . > md-index.json
          echo "indexed $(jq length md-index.json) markdown files"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 部署整個工作區，讓 index.html 的相對連結（analysis/.. derived/..）可用
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
